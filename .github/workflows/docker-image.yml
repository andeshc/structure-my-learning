name: Docker Image CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Generate version tag
        id: version
        run: |
          DATE_TAG=$(date +%Y.%m.%d)
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          EXISTING_TAGS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${OWNER}/packages/container/${REPO_NAME}/versions" \
            | jq -r '.[].metadata.container.tags[]? // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING_TAGS" ]; then
            HIGHEST=$(echo "$EXISTING_TAGS" | grep "^${DATE_TAG}-" | sed "s/^${DATE_TAG}-//" | grep -E '^[0-9]+$' | sort -n | tail -1)
          else
            HIGHEST=""
          fi

          NEXT=$([ -z "$HIGHEST" ] && echo 1 || echo $((HIGHEST + 1)))
          VERSION_TAG="${DATE_TAG}-${NEXT}"

          echo "Generated version tag: $VERSION_TAG"
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ steps.version.outputs.owner }}/${{ steps.version.outputs.repo_name }}
          VERSION=${{ steps.version.outputs.version_tag }}

          docker build . --file Dockerfile --tag $IMAGE:$VERSION --tag $IMAGE:latest
          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

          echo "Pushed: $IMAGE:$VERSION and $IMAGE:latest"
