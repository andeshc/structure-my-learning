name: Docker Image CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Generate version tag
        id: version
        run: |
          # Generate date in YYYY.MM.DD format
          DATE_TAG=$(date +%Y.%m.%d)

          # Get existing tags for today from GitHub Container Registry
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Try to get existing tags, handle case where no tags exist yet
          EXISTING_TAGS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${{ github.repository_owner }}/packages/container/structure-my-learning/versions" \
            | jq -r '.[].metadata.container.tags[]? // empty' 2>/dev/null || echo "")

          # Find highest increment for today's date
          if [ -n "$EXISTING_TAGS" ]; then
            HIGHEST_INCREMENT=$(echo "$EXISTING_TAGS" | grep "^${DATE_TAG}-" | sed "s/^${DATE_TAG}-//" | grep -E '^[0-9]+$' | sort -n | tail -1)
          else
            HIGHEST_INCREMENT=""
          fi

          # Set next increment (start from 1 if no existing tags for today)
          if [ -z "$HIGHEST_INCREMENT" ]; then
            NEXT_INCREMENT=1
          else
            NEXT_INCREMENT=$((HIGHEST_INCREMENT + 1))
          fi

          # Create version tag
          VERSION_TAG="${DATE_TAG}-${NEXT_INCREMENT}"

          echo "Generated version tag: $VERSION_TAG"
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/structure-my-learning
          VERSION_TAG=${{ steps.version.outputs.version_tag }}

          docker build . --file Dockerfile --tag $IMAGE_TAG:$VERSION_TAG --tag $IMAGE_TAG:latest
          docker push $IMAGE_TAG:$VERSION_TAG
          docker push $IMAGE_TAG:latest

          echo "Pushed image with tags: $VERSION_TAG, latest"
